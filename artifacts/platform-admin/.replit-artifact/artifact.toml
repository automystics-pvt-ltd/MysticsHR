kind = "web"
previewPath = "/platform_admin/"
title = "Platform Admin"
version = "1.0.0"
id = "artifacts/platform-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/platform_admin/" ]
localPort = 19154

[services.development]
run = "pnpm --filter @workspace/platform-admin run dev"

[services.production]
publicDir = "artifacts/platform-admin/dist/public"
serve = "static"

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/platform-admin", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/platform_admin/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19154"
BASE_PATH = "/platform_admin/"
