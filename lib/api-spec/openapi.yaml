  /storage-cleanup/runs:
    get:
      operationId: listStorageCleanupRuns
      tags: [system-config]
      summary: List recent orphan-attachment cleanup runs (super admin only)
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Most recent cleanup runs, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorageCleanupRun'
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  /storage-cleanup/run:
    post:
      operationId: triggerStorageCleanupRun
      tags: [system-config]
      summary: Manually trigger an orphan-attachment cleanup run (super admin only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dryRun:
                  type: boolean
                  description: If true, list candidates but do not delete
                  default: false
      responses:
        '200':
          description: Run summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageCleanupRunResult'
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500':
          description: Cleanup failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  detail: { type: string }

  /role-permissions:
    get:
      operationId: getRolePermissions
      tags: [system-config]
      summary: Get RBAC permission matrix (all roles × modules × actions)
      responses:
        '200':
          description: Full RBAC permission matrix (module → action → allowed roles[])
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePermissions'
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
    put:
      operationId: updateRolePermissions
      tags: [system-config]
      summary: Update RBAC permission matrix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissions'
      responses:
        '200':
          description: Updated RBAC permission matrix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePermissions'
        '400': { description: Bad Request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }

  # ──────────────────────────────────────────────────────────────────────────────

components:
  schemas:
    ShiftTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        shiftType: { type: string, enum: [Fixed, Flexible, Rotational, "Night Shift"] }
        startTime: { type: string }
        endTime: { type: string }
        gracePeriodMinutes: { type: integer }
        breakDurationMinutes: { type: integer }
        minWorkingHoursMinutes: { type: integer }
        weeklyOff: { type: ["array", "null"], items: { type: string } }
        departmentId: { type: ["integer", "null"] }
        shiftRatePerHour: { type: ["string", "null"] }
        nightDifferentialRate: { type: ["string", "null"] }
        overtimeThresholdMinutes: { type: integer }
        isActive: { type: boolean }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, shiftType, startTime, endTime, gracePeriodMinutes, breakDurationMinutes, minWorkingHoursMinutes, overtimeThresholdMinutes, isActive, createdAt, updatedAt]

    CreateShiftTemplateBody:
      type: object
      required: [name, shiftType, startTime, endTime]
      properties:
        name: { type: string }
        shiftType: { type: string, enum: [Fixed, Flexible, Rotational, "Night Shift"] }
        startTime: { type: string }
        endTime: { type: string }
        gracePeriodMinutes: { type: integer, default: 0 }
        breakDurationMinutes: { type: integer, default: 0 }
        minWorkingHoursMinutes: { type: integer, default: 480 }
        weeklyOff: { type: ["array", "null"], items: { type: string } }
        departmentId: { type: ["integer", "null"] }
        shiftRatePerHour: { type: ["string", "null"] }
        nightDifferentialRate: { type: ["string", "null"] }
        overtimeThresholdMinutes: { type: integer, default: 30 }
        isActive: { type: boolean, default: true }
        notes: { type: ["string", "null"] }

    ShiftAssignment:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        shiftTemplateId: { type: integer }
        shiftTemplateName: { type: ["string", "null"] }
        effectiveFrom: { type: string, format: date }
        effectiveTo: { type: ["string", "null"], format: date }
        assignedById: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, employeeId, shiftTemplateId, effectiveFrom, createdAt, updatedAt]

    CreateShiftAssignmentBody:
      type: object
      required: [shiftTemplateId, effectiveFrom]
      properties:
        shiftTemplateId: { type: integer }
        effectiveFrom: { type: string, format: date }
        effectiveTo: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }

    ShiftCalendarEntry:
      type: object
      properties:
        employeeId: { type: integer }
        employeeName: { type: string }
        employeeCode: { type: string }
        date: { type: string, format: date }
        shiftTemplateId: { type: ["integer", "null"] }
        shiftName: { type: ["string", "null"] }
        startTime: { type: ["string", "null"] }
        endTime: { type: ["string", "null"] }
        attendanceStatus: { type: ["string", "null"] }
      required: [employeeId, employeeName, employeeCode, date]

    ShiftSwap:
      type: object
      properties:
        id: { type: integer }
        requesterEmployeeId: { type: integer }
        requesterName: { type: ["string", "null"] }
        swapWithEmployeeId: { type: integer }
        swapWithName: { type: ["string", "null"] }
        swapDate: { type: string, format: date }
        reason: { type: ["string", "null"] }
        hodStatus: { type: string, enum: [Pending, Approved, Rejected] }
        hodRemarks: { type: ["string", "null"] }
        hodActionedAt: { type: ["string", "null"], format: date-time }
        hrStatus: { type: string, enum: [Pending, Approved, Rejected] }
        hrRemarks: { type: ["string", "null"] }
        hrActionedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, requesterEmployeeId, swapWithEmployeeId, swapDate, hodStatus, hrStatus, createdAt, updatedAt]

    CreateShiftSwapBody:
      type: object
      required: [swapWithEmployeeId, swapDate]
      properties:
        swapWithEmployeeId: { type: integer }
        swapDate: { type: string, format: date }
        reason: { type: ["string", "null"] }

    ShiftSwapActionBody:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [Approved, Rejected] }
        remarks: { type: ["string", "null"] }

    AttendanceRecord:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        employeeName: { type: ["string", "null"] }
        employeeCode: { type: ["string", "null"] }
        attendanceDate: { type: string, format: date }
        signInTime: { type: ["string", "null"], format: date-time }
        signOutTime: { type: ["string", "null"], format: date-time }
        totalMinutesWorked: { type: ["integer", "null"] }
        breakDurationMinutes: { type: ["integer", "null"] }
        overtimeMinutes: { type: ["integer", "null"] }
        status: { type: string }
        isHrOverride: { type: boolean }
        overrideReason: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        signInLatitude: { type: ["string", "null"], description: "Latitude captured at clock-in (decimal string, 6dp)" }
        signInLongitude: { type: ["string", "null"], description: "Longitude captured at clock-in (decimal string, 6dp)" }
        signInAccuracyMeters: { type: ["integer", "null"], description: "Geolocation accuracy in metres at clock-in" }
        signInUserAgent: { type: ["string", "null"], description: "Browser/device user agent recorded at clock-in" }
        signOutLatitude: { type: ["string", "null"] }
        signOutLongitude: { type: ["string", "null"] }
        signOutAccuracyMeters: { type: ["integer", "null"] }
        signOutUserAgent: { type: ["string", "null"] }
        signInTimezone: { type: ["string", "null"], description: "IANA timezone the employee was in at clock-in (e.g. Asia/Kolkata)" }
        signOutTimezone: { type: ["string", "null"], description: "IANA timezone the employee was in at clock-out" }
        employeeTimezone: { type: ["string", "null"], description: "Employee's preferred IANA timezone (from employees.timezone)" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        suspicionFlags:
          type: array
          description: Computed flags for HR review (missing GPS, low accuracy, far from any registered office). Empty when nothing was flagged.
          items:
            type: object
            properties:
              code: { type: string, enum: [MISSING_GPS, LOW_ACCURACY, OUT_OF_RADIUS] }
              reason: { type: string }
            required: [code, reason]
      required: [id, employeeId, attendanceDate, status, isHrOverride, createdAt, updatedAt]

    AttendanceSuspicionOffice:
      type: object
      properties:
        name: { type: string }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        location:
          type: ["string", "null"]
          description: "Optional employee work-location this office anchors. Empty/null = global fallback. Matched case-insensitively against employee_profiles.work_location."
      required: [name, latitude, longitude]

    AttendanceSuspicionConfig:
      type: object
      properties:
        maxAccuracyMeters: { type: number, minimum: 0, description: "Worse GPS accuracy than this is flagged." }
        maxRadiusMeters: { type: number, minimum: 0, description: "Distance from every registered office above which the punch is flagged." }
        requireGps: { type: boolean, description: "When true, punches without latitude/longitude telemetry are flagged as suspicious." }
        offices:
          type: array
          items: { $ref: "#/components/schemas/AttendanceSuspicionOffice" }
      required: [maxAccuracyMeters, maxRadiusMeters, offices]

    AttendanceSuspicionConfigUpdate:
      type: object
      description: Partial update; omitted fields keep their current value.
      properties:
        maxAccuracyMeters: { type: number, minimum: 0 }
        maxRadiusMeters: { type: number, minimum: 0 }
        requireGps: { type: boolean }
        offices:
          type: array
          items: { $ref: "#/components/schemas/AttendanceSuspicionOffice" }

    ClockPunchTelemetry:
      type: object
      description: Optional client-supplied context for self-service punches (geolocation, device, and the employee's local date).
      properties:
        latitude: { type: ["number", "null"], minimum: -90, maximum: 90 }
        longitude: { type: ["number", "null"], minimum: -180, maximum: 180 }
        accuracy: { type: ["number", "null"], minimum: 0, description: "Geolocation accuracy in metres" }
        userAgent: { type: ["string", "null"], maxLength: 500 }
        clientDate: { type: ["string", "null"], format: date, description: "Employee's local calendar date (YYYY-MM-DD). Used as the attendance day instead of server UTC when present." }
        timezone: { type: ["string", "null"], maxLength: 100, description: "IANA timezone the employee is in at the moment of the punch (e.g. Asia/Kolkata). Persisted on the attendance row so HR can disambiguate edits in the override dialog." }

