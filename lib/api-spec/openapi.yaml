  # ─── System Settings ─────────────────────────────────────────────────────────

  /notification-defaults:
    get:
      operationId: getNotificationDefaults
      tags: [system-config]
      summary: Get company-wide default notification preferences for new joiners
      responses:
        '200':
          description: Default toggles for every event type
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/NotificationPreferenceItem" }
                required: [items]
    put:
      operationId: updateNotificationDefaults
      tags: [system-config]
      summary: Replace company-wide default notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyNotificationPreferencesBody"
      responses:
        '200':
          description: Update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  count: { type: integer }
                required: [success, count]

  /system-settings/{category}:
    get:
      operationId: getSystemSettings
      tags: [system-config]
      summary: Get all settings for a category
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: string }
        - in: query
          name: withSource
          required: false
          description: When "true", returns an envelope with per-key source attribution (db vs server default).
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: |
            When withSource is omitted: a flat key-value map of settings.
            When withSource=true: an envelope `{ values: {...}, sources: { key: "db" | "default" } }`.
            The actual server-default values are NEVER returned — only the source label.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      operationId: updateSystemSettings
      tags: [system-config]
      summary: Upsert settings for a category
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

