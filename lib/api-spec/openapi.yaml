  /payroll/analytics:
    get:
      operationId: getPayrollAnalytics
      tags: [payroll]
      summary: Aggregated payroll analytics (trend, department breakdown, statutory totals)
      parameters:
        - name: from
          in: query
          description: Window start, format YYYY-MM (e.g. 2025-04). Defaults to 12 months ago.
          schema: { type: string }
        - name: to
          in: query
          description: Window end inclusive, format YYYY-MM. Defaults to current month.
          schema: { type: string }
        - name: compareWithPrior
          in: query
          description: When true, each monthly trend point is augmented with prior-year (same month minus 12) totals.
          schema: { type: boolean }
        - name: deptYear
          in: query
          description: Year of the period to use for the department breakdown. Defaults to the latest finalized run in the window.
          schema: { type: integer }
        - name: deptMonth
          in: query
          description: Month (1-12) of the period to use for the department breakdown. Used together with deptYear.
          schema: { type: integer }
      responses:
        "200":
          description: Analytics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  financialYear: { type: string }
                  windowFrom:
                    type: string
                    description: Effective window start (YYYY-MM) used for this response.
                  windowTo:
                    type: string
                    description: Effective window end (YYYY-MM) used for this response.
                  latestPeriodLabel:
                    type: string
                    nullable: true
                  latestRunId:
                    type: integer
                    nullable: true
                    description: Payroll run id used for the department breakdown — enables click-through to that run's detail page.
                  latestPeriodYear:
                    type: integer
                    nullable: true
                    description: Year of the period used for the department breakdown.
                  latestPeriodMonth:
                    type: integer
                    nullable: true
                    description: Month (1-12) of the period used for the department breakdown.
                  availablePeriods:
                    type: array
                    description: All distinct (year, month) periods that have a finalized run in the window — used to populate the department-card period selector.
                    items:
                      type: object
                      properties:
                        year: { type: integer }
                        month: { type: integer }
                        label: { type: string }
                  monthlyTrend:
                    type: array
                    items:
                      type: object
                      properties:
                        year: { type: integer }
                        month: { type: integer }
                        label: { type: string }
                        totalGross: { type: number }
                        totalDeductions: { type: number }
                        totalNet: { type: number }
                        employees: { type: integer }
                        priorTotalGross:
                          type: number
                          nullable: true
                          description: Same-month total gross from one year prior. Present only when compareWithPrior=true.
                        priorTotalDeductions:
                          type: number
                          nullable: true
                        priorTotalNet:
                          type: number
                          nullable: true
                        priorEmployees:
                          type: integer
                          nullable: true
                  departmentBreakdown:
                    type: array
                    items:
                      type: object
                      properties:
                        departmentId:
                          type: integer
                          nullable: true
                        departmentName: { type: string }
                        totalGross: { type: number }
                        totalNet: { type: number }
                        employees: { type: integer }
                  statutoryDeductions:
                    type: object
                    properties:
                      pfEmployee: { type: number }
                      pfEmployer: { type: number }
                      esiEmployee: { type: number }
                      esiEmployer: { type: number }
                      professionalTax: { type: number }
                      tds: { type: number }
                  ytdTotals:
                    type: object
                    properties:
                      totalGross: { type: number }
                      totalDeductions: { type: number }
                      totalNet: { type: number }
                      runs: { type: integer }

