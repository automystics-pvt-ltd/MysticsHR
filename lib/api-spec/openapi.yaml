openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MysticsHR API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: notifications
    description: Notification templates, logs, and channel configuration
  - name: system-config
    description: System configuration — org profile, statutory rates, approval chains, RBAC
  - name: performance
    description: Performance management — cycles, goals, appraisals, calibration, outcomes
  - name: ess
    description: Employee Self-Service portal — profile, dashboard, and self-service actions
  - name: helpdesk
    description: Internal helpdesk ticketing — raise, track, and resolve tickets
  - name: documents
    description: HR document generation — templates and issued letterhead documents
  - name: health
    description: Health operations
  - name: departments
    description: Department management
  - name: designations
    description: Designation management
  - name: employees
    description: Employee management
  - name: users
    description: User management
  - name: roles
    description: Role definitions
  - name: requisitions
    description: Job requisitions
  - name: candidates
    description: Recruitment candidates
  - name: interviews
    description: Interview scheduling and feedback
  - name: offers
    description: Offer letters
  - name: pre-onboarding
    description: Pre-onboarding documents and verification
  - name: audit-logs
    description: Audit log access
  - name: dashboard
    description: Dashboard and analytics
  - name: payroll
    description: Payroll management — salary structures, runs, payslips, TDS, statutory reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────────────────────────────────────────────
  # DASHBOARD
  # ──────────────────────────────────────────────
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get executive KPI dashboard metrics
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent HR activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/headcount-by-department:
    get:
      operationId: getDashboardHeadcountByDepartment
      tags: [dashboard]
      summary: Headcount grouped by department
      responses:
        "200":
          description: Headcount per department
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeadcountByDepartment"

  /dashboard/expiring-certifications:
    get:
      operationId: getDashboardExpiringCertifications
      tags: [dashboard]
      summary: List employee certifications expiring within N days (including already expired)
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 60
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Expiring certifications, ordered by expiry date ascending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpiringCertification"

  /dashboard/employee-status-breakdown:
    get:
      operationId: getDashboardEmployeeStatusBreakdown
      tags: [dashboard]
      summary: Employee count by status
      responses:
        "200":
          description: Status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  # ──────────────────────────────────────────────
  # DEPARTMENTS
  # ──────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "404":
          description: Not found
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentBody"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────────────
  # DESIGNATIONS
  # ──────────────────────────────────────────────
  /designations:
    get:
      operationId: listDesignations
      tags: [designations]
      summary: List all designations
      parameters:
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of designations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Designation"
    post:
      operationId: createDesignation
      tags: [designations]
      summary: Create a designation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDesignationBody"
      responses:
        "201":
          description: Designation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"

  /designations/{id}:
    get:
      operationId: getDesignation
      tags: [designations]
      summary: Get a designation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Designation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"
    patch:
      operationId: updateDesignation
      tags: [designations]
      summary: Update a designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDesignationBody"
      responses:
        "200":
          description: Updated designation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"
    delete:
      operationId: deleteDesignation
      tags: [designations]
      summary: Delete a designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────────────
  # EMPLOYEES
  # ──────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: skill
          in: query
          description: Substring match (case-insensitive) on an employee's skill name. Returns employees who have at least one matching skill.
          schema:
            type: ["string", "null"]
        - name: certification
          in: query
          description: Substring match (case-insensitive) on an employee's certification name. Returns employees who hold at least one matching certification.
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/me/timezone:
    patch:
      operationId: updateMyTimezone
      tags: [employees]
      summary: Update the authenticated employee's preferred IANA timezone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                timezone:
                  type: string
                  description: IANA timezone identifier (e.g. "Asia/Kolkata").
              required:
                - timezone
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Invalid timezone identifier
        "403":
          description: User not linked to an employee record

  /employees/me/avatar:
    patch:
      operationId: updateMyAvatar
      tags: [employees]
      summary: Update the authenticated employee's own profile photo (self-service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                avatarUrl:
                  type: string
                  description: Object storage path returned by the presigned upload flow.
              required:
                - avatarUrl
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "403":
          description: User not linked to an employee record

  /employees/id-config:
    get:
      operationId: getEmployeeIdConfig
      tags: [employees]
      summary: Get the tenant's configured employee ID prefix (validation hint only)
      responses:
        "200":
          description: Employee ID prefix configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  employeeIdPrefix:
                    type: ["string", "null"]

  /employees/{id}/id-card/preview:
    get:
      operationId: previewEmployeeIdCard
      tags: [Onboarding]
      summary: On-screen HTML preview of the employee ID card (same branding/fields as the PDF)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: HTML preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  html:
                    type: string
        "403":
          description: Conditions not met — onboarding checklist not 100% complete

  /employees/{id}/avatar:
    get:
      operationId: getEmployeeAvatar
      tags: [employees]
      summary: Serve an employee's uploaded photo
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: No photo on file

  /employees/skills/distinct:
    get:
      operationId: listDistinctEmployeeSkills
      tags: [employees]
      summary: List distinct skill names held by any non-deleted employee
      responses:
        "200":
          description: Distinct skill names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string

  /employees/certifications/distinct:
    get:
      operationId: listDistinctEmployeeCertifications
      tags: [employees]
      summary: List distinct certification names held by any non-deleted employee
      responses:
        "200":
          description: Distinct certification names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string

  /employees/org-chart:
    get:
      operationId: listOrgChart
      tags: [employees]
      summary: List active employees with the minimal fields needed for an org chart
      responses:
        "200":
          description: Org chart entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgChartEmployee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get an employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Soft-delete (deactivate) an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deactivated

  /employees/bulk-import:
    post:
      summary: Bulk import employees via CSV data
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [rows]
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /employees/{id}/profile:
    get:
      summary: Get extended employee profile
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Employee profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"
    put:
      summary: Create or update extended employee profile
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEmployeeProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"

  /employees/{id}/education:
    get:
      summary: List employee education records
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Education records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeEducation"
    post:
      summary: Add education record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeEducationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeEducation"

  /employees/{id}/education/import:
    post:
      summary: Bulk import education records via CSV data
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [rows]
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /employee-education/{id}:
    patch:
      summary: Update education record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeEducationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeEducation"
    delete:
      summary: Delete education record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/work-experience:
    get:
      summary: List employee work experience
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Work experience records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeWorkExperience"
    post:
      summary: Add work experience record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeWorkExperienceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeWorkExperience"

  /employees/{id}/work-experience/import:
    post:
      summary: Bulk import work experience records via CSV data
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [rows]
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /employee-work-experience/{id}:
    patch:
      summary: Update work experience record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeWorkExperienceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeWorkExperience"
    delete:
      summary: Delete work experience record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/skills:
    get:
      summary: List employee skills
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Skill records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeSkill"
    post:
      summary: Add skill record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeSkillBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeSkill"

  /employees/{id}/skills/import:
    post:
      summary: Bulk import skill records via CSV data
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [rows]
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /employee-skills/{id}:
    patch:
      summary: Update skill record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeSkillBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeSkill"
    delete:
      summary: Delete skill record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/certifications:
    get:
      summary: List employee certifications
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Certification records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeCertification"
    post:
      summary: Add certification record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeCertificationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeCertification"

  /employees/{id}/certifications/import:
    post:
      summary: Bulk import certification records via CSV data
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [rows]
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /employee-certifications/{id}:
    patch:
      summary: Update certification record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeCertificationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeCertification"
    delete:
      summary: Delete certification record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/family-members:
    get:
      summary: List employee family members
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Family member records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeFamilyMember"
    post:
      summary: Add family member record
