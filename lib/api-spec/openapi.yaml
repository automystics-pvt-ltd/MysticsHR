  /performance/cycle-averages:
    get:
      operationId: getCycleAverages
      tags: [performance]
      summary: Aggregate final scores per cycle for peer comparison (HR/HOD only)
      description: >-
        Returns the average final score across cycles in which the target
        employee has a finalized outcome. The target employee's own score is
        excluded from the average. Cycles with fewer than 2 peers are omitted
        to avoid de-anonymizing individuals. HR roles may request department,
        designation, or company-wide averages; HOD users may only request
        department averages and only for their direct reports.
      parameters:
        - { name: employeeId, in: query, required: true, schema: { type: integer } }
        - name: scope
          in: query
          description: >-
            Cohort over which peers are aggregated. `department` averages all
            employees in the target's department; `designation` averages all
            employees sharing the target's designation (job title) regardless
            of department, useful for like-for-like calibration discussions;
            `company` averages every employee. HOD users may only request
            `department`. Cycles where the target employee has no designation
            yield an empty result for `designation` scope.
          schema:
            type: string
            enum: [department, designation, company]
            default: department
      responses:
        "200":
          description: Aggregate scores per cycle
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CycleAverage"

